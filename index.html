<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="assets/style.css">
    <title>Tesko</title>
</head>
<body>
    <div class="d-flex justify-content-center align-items-center" style="height: 30vh;">
        <div class="card" style="width: 50rem;">
            <div class="card-body">
                <div class="btn-group pb-3">
                    <button type="button" data-bs-toggle="modal" class="btn btn-success" data-bs-target="#criarTarefa">Criar nova tarefa</button>
                </div>
                <div id="lista-tarefas">

                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="criarTarefa" tabindex="-1" aria-labelledby="criarTarefaLabel" aria-hidden="true">
      <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="criarTarefaLabel">Modal title</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form>
                <div class="mb-3">
                    <label for="nomeTarefa" class="form-label">Adicionar</label>
                    <input type="text" class="form-control" id="nomeTarefa" aria-describedby="nomeTarefa" placeholder="Nome da Tarefa">
                </div>
                <div class="mb-3">
                    <label for="descricaoTarefa" class="form-label">Descrição</label>
                    <textarea class="form-control" name="descricaoTarefa" id="descricaoTarefa"></textarea>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
              <button type="button" id="btnSalvar" class="btn btn-primary">Salvar</button>
            </div>
          </div>
      </div>
    </div>
    
    <script src="assets/app.js"></script>
</body>
</html>
